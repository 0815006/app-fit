# ===================================================
# app-fit 全栈网站 (Vue3 Web + 微信小程序)
# 部署路径：/etc/nginx/conf.d/app-fit.conf
# ===================================================

# ---------- server 0：80 端口 HTTP 强制跳转 HTTPS ----------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name realapex.site www.realapex.site api.realapex.site;
    return 301 https://$host$request_uri;
}

# ---------- server 1：8081 端口（Web 前端 + API，仅 HTTPS）----------
server {
    listen 8081 ssl;
    server_name realapex.site www.realapex.site 129.211.9.238;

    ssl_certificate /etc/nginx/cert/realapex.site_bundle.pem;
    ssl_certificate_key /etc/nginx/cert/realapex.site.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # 1. 前端静态页面托管
    location / {
        root /var/www/app-fit/dist;
        index index.html;
        try_files $uri $uri/ /index.html; # 支持 Vue Router 的 history 模式
    }

    # 2. 后端 API 反向代理
    location /api/ {
        # 转发到 Docker 暴露出来的 8091 端口（对应 .bat 里的 -p 8091:8091）
        proxy_pass http://127.0.0.1:8091/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- server 2：443 端口（微信小程序 API）----------
# 微信后台要求 HTTPS，且不能带端口尾巴
# ===================================================
server {
    listen 443 ssl;
    server_name realapex.site www.realapex.site api.realapex.site;

    ssl_certificate /etc/nginx/cert/realapex.site_bundle.pem;
    ssl_certificate_key /etc/nginx/cert/realapex.site.key;

    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/fit_api_access.log;
    error_log /var/log/nginx/fit_api_error.log;

    # 1. 前端静态页面托管
    location / {
        root /var/www/app-fit/dist;
        index index.html;
        try_files $uri $uri/ /index.html; # 支持 Vue Router 的 history 模式
    }

    # 2. 微信小程序 API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8091/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}