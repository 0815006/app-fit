server:
  port: ${SERVER_PORT:8091}

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: ${FILE_MAX_SIZE:20MB}
      max-request-size: ${FILE_MAX_SIZE:20MB}
  application:
    name: java-fit-server
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/fit_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.fit: debug
