server:
  port: ${SERVER_PORT:8091}

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: ${FILE_MAX_SIZE:20MB}
      max-request-size: ${FILE_MAX_SIZE:20MB}
  application:
    name: java-fit-server
  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/fit_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.fit: debug

# ========== Sa-Token 配置 ==========
sa-token:
  token-name: satoken
  timeout: 2592000       # 30天过期
  active-timeout: -1     # 永不过期（不活跃也不会踢出）
  is-concurrent: true    # 允许同一账号并发登录
  is-share: true         # 共用一个Token
  token-style: uuid      # Token风格
  is-log: false          # 关闭日志

# ========== 微信小程序 ==========
wx:
  app-id: ${WX_APP_ID:wx6bb890ad9c1e9c52}
  app-secret: ${WX_APP_SECRET:6e4c1ae7fcb99e203b13cd91c377a892}
  mock: false            # 本地调试可临时改为 true
  subscribe:
    template-id: KABRC3CxbGsD2TZQNjPWcWEl17kU1q0rNipugHkMUmA

# ========== 头像上传 ==========
app:
  upload:
    avatar-path: ${AVATAR_PATH:./uploads/avatar}
    avatar-url-prefix: /uploads/avatar

# ========== Actuator / Prometheus 监控 ==========
management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info
  metrics:
    tags:
      application: ${spring.application.name}
